services:
  backend-blue:
    image: ${DOCKER_USERNAME}/project-backend:latest
    container_name: backend-blue
    restart: always
    env_file: .env
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    networks:
      - infra_network

networks:
  infra_network:
    external: true
