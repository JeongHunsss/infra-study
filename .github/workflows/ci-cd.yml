name: Backend CI/CD with Dynamic SG

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Docker Hub 로그인 및 빌드/푸시 (기존과 동일)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-backend:latest

      # 2. 깃헙 로봇의 공인 IP 가져오기
      - name: Get GitHub Actions IP
        id: ip
        uses: haythem/public-ip@v1.2

      # 3. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. AWS 보안 그룹에 로봇 IP 임시 허용 (22번 포트)
      - name: Add GitHub IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      # 5. 서버 접속 및 무중단 배포 스크립트 실행
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~

            # 1. deploy 폴더가 없으면 새로 가져오고(clone), 있으면 무시!
            if [ ! -d "deploy" ]; then
              git clone https://github.com/JeongHunsss/infra-study.git deploy
            fi

            # 2. 배포 폴더로 들어가서 최신 코드 땡겨오기
            cd deploy
            git pull origin master

            # 3. 도커 컴포즈가 읽을 .env 파일 실시간 생성
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
            echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            echo "MYSQL_DATABASE=infra_study" >> .env

            # 4. 무중단 배포 스크립트에 실행 권한 주고 출격!
            chmod +x infra/deploy.sh
            ./infra/deploy.sh

      # 6. (중요) 작업 성공/실패 여부 상관없이 무조건 보안 그룹에서 IP 제거
      - name: Remove GitHub IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
