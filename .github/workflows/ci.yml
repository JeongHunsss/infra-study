name: Backend CI/CD with Dynamic SG

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Docker Hub 로그인 및 빌드/푸시 (기존과 동일)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-backend:latest

      # 2. 깃헙 로봇의 공인 IP 가져오기
      - name: Get GitHub Actions IP
        id: ip
        uses: haythem/public-ip@v1.2

      # 3. AWS 자격 증명 설정
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 4. AWS 보안 그룹에 로봇 IP 임시 허용 (22번 포트)
      - name: Add GitHub IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      # 5. 서버 접속 및 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 최신 백엔드 이미지 땡겨오기
            docker pull ${{ secrets.DOCKER_USERNAME }}/project-backend:latest

            # 2. 깃헙에서 최신 docker-compose.yml, nginx.conf 파일 서버로 다운받기
            # (서버에 코드 저장할 폴더 만들고 깃헙에서 땡겨옴)
            mkdir -p ~/deploy
            cd ~/deploy
            curl -O https://raw.githubusercontent.com/JeongHunsss/infra-study/main/docker-compose.yml
            mkdir -p nginx
            curl -o nginx/nginx.conf https://raw.githubusercontent.com/JeongHunsss/infra-study/main/nginx/nginx.conf

            # 3. 도커 컴포즈로 기존 거 끄고 새 이미지로 다시 띄우기
            docker-compose down
            docker-compose up -d

      # 6. (중요) 작업 성공/실패 여부 상관없이 무조건 보안 그룹에서 IP 제거
      - name: Remove GitHub IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32
