events {}

http {
    server {
        listen 80;

        location / {
            # 1. 도커 내부 DNS (이게 있어야 컨테이너 이름을 IP로 변환함)
            resolver 127.0.0.11 valid=30s;

            # 2. 주소를 변수에 담기 (★ 이게 핵심 ★)
            # 변수를 쓰면 Nginx가 부팅할 때 이 주소가 진짜 있는지 검사 안 함!
            set $target_url "";
            
            # 3. 배포 스크립트가 갈아끼우는 파일을 여기서 include
            include /etc/nginx/conf.d/service-url.inc;

            # 4. 변수로 찌르기
            proxy_pass http://$target_url;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}